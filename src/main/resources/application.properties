spring.application.name=mes-poc

server.port=8050

# Allow reasonably large uploads for spreadsheets / xml documents.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ── Catalogue persistence (default profile: local H2) ──────────────────────
# File-based H2 so registered datasets survive restarts; zero external setup.
# AUTO_SERVER lets the H2 console and the app share the same file connection.
# On AWS, activate the 'aws' profile (application-aws.properties) for MySQL/RDS.
spring.datasource.url=jdbc:h2:file:./data/mes-catalogue;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# H2 web console is DISABLED — it exposes an interactive SQL shell over the DB that
# holds (encrypted) banking file blobs and metadata. Enable only for ad-hoc local
# debugging, never in a shared/deployed environment.
spring.h2.console.enabled=false

# CORS: origins allowed to call /api/** from the browser (comma-separated).
# Defaults target the local React dev servers (CRA :3000, Vite :5173).
# Override for deployed UIs, e.g. mes.cors.allowed-origins=https://my-ui.example.com
mes.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Anthropic Claude API Configuration.
# Model used for metadata enrichment (auto-tagging, descriptions, compliance flags).
llm.model=claude-sonnet-4-6

# Reasoning effort (LOW|MEDIUM|HIGH). MEDIUM balances accuracy and cost for the
# multi-label PII/NPI/PCI classification. Output token budget per request; raised
# so wide (50+ column) datasets aren't truncated (columns are also batched).
llm.effort=MEDIUM
llm.maxTokens=16000

# API key is read from the ANTHROPIC_API_KEY environment variable
# Locally: set ANTHROPIC_API_KEY before running. On AWS: provide it
# By adding it as ANTHROPIC_API_KEY = "actual key" by editing config of applicatoon
# enrichment falls back to the local rules engine).
llm.api.key=${ANTHROPIC_API_KEY:}

# ── Encryption at rest for stored files ────────────────────────────────────
# AES-256-GCM key (Base64, 32 raw bytes) used to encrypt uploaded file blobs
# before they are persisted in the catalogue DB. Read from MES_FILE_ENCRYPTION_KEY.
# If blank, a built-in dev key is used and a warning is logged — set a real key
# (e.g. `openssl rand -base64 32`) for any non-local environment.
mes.file.encryption-key=${MES_FILE_ENCRYPTION_KEY:}

# ── Logging hygiene ─────────────────────────────────────────────────────────
# Keep the Anthropic SDK / OkHttp at WARN so request bodies, headers (API key) and
# column sample payloads are never written to logs.
logging.level.okhttp3=WARN
logging.level.com.anthropic=WARN