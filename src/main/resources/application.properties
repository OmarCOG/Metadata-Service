spring.application.name=mes-poc

# Allow reasonably large uploads for spreadsheets / xml documents.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# CORS: origins allowed to call /api/** from the browser (comma-separated).
# Defaults target the local React dev servers (CRA :3000, Vite :5173).
# Override for deployed UIs, e.g. mes.cors.allowed-origins=https://my-ui.example.com
mes.cors.allowed-origins=http://localhost:3000,http://localhost:5173


# Anthropic Claude API Configuration Properties - the key and url below is an example not actual values
# Target endpoint routing destination for the Anthropic Messages API
llm.api.url=[https://api.anthropic.com/v1/messages](https://api.anthropic.com/v1/messages)

# Flag setting the chosen model allocation tier (e.g., Claude 3.5 Sonnet)
llm.model=claude-3-5-sonnet-20240620

# Your secure corporate or developer Anthropic access key token
llm.api.key=sk-ant-api03-your-actual-claude-key-goes-here