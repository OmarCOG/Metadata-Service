spring.application.name=mes-poc

server.port=8050

# Allow reasonably large uploads for spreadsheets / xml documents.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# CORS: origins allowed to call /api/** from the browser (comma-separated).
# Defaults target the local React dev servers (CRA :3000, Vite :5173).
# Override for deployed UIs, e.g. mes.cors.allowed-origins=https://my-ui.example.com
mes.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Anthropic Claude API Configuration.
# Model used for metadata enrichment (auto-tagging, descriptions, compliance flags).
llm.model=claude-sonnet-4-6

# API key is read from the ANTHROPIC_API_KEY environment variable
# Locally: set ANTHROPIC_API_KEY before running. On AWS: provide it
# By adding it as ANTHROPIC_API_KEY = "actual key" by editing config of applicatoon
# enrichment falls back to the local rules engine).
llm.api.key=${ANTHROPIC_API_KEY:}