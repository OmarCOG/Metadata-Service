# ── Catalogue persistence: AWS profile (MySQL / RDS) ──────────────────────
# Activate with: --spring.profiles.active=aws  (or SPRING_PROFILES_ACTIVE=aws)
# Connection details come from environment variables so no secrets live in git.
#
#   DB_URL       e.g. jdbc:mysql://<rds-endpoint>:3306/mes_catalogue
#   DB_USER      RDS username
#   DB_PASSWORD  RDS password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# H2 console is meaningless against MySQL.
spring.h2.console.enabled=false
